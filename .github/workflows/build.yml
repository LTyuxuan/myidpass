name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build WebView APK
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install APK Builder
      run: npm install -g webview-apk-builder

    - name: Build APK File
      run: |
        webview-apk-builder build \
        --app-name "电子通行证" \
        --package-name "com.police.pass" \
        --version-code 2 \
        --version-name "1.1" \
        --icon "./icon.png" \
        --background "./bg.jpg" \
        --status-bar-color "#00000000" \
        --status-bar-text-color "black" \
        --clear-cache true \
        --clear-session-cache true \
        --immersive-status-bar true \
        --disable-network true \
        --screen-orientation "portrait"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: dist/app-release.apk
