name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build APK
      uses: seegood-dev/webview-apk-builder@v1
      with:
        appName: "电子通行证"
        packageName: "com.police.pass"
        versionCode: 2
        versionName: "1.1"
        icon: "icon.png"
        background: "bg.jpg"
        # 黑色状态栏图标 + 完全透明悬浮状态栏
        statusBarColor: "#00000000"
        statusBarTextColor: "black"
        # 彻底关闭WebView缓存，根治二次打开时间不显示
        clearCache: true
        clearSessionCache: true
        immersiveStatusBar: true
        # 纯本地离线锁网，无任何网络请求
        disableNetwork: true
        hideNavigationBar: false
        # 锁定竖屏，禁止旋转
        screenOrientation: "portrait"
