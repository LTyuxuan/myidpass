name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 官方永久Action：拉取你仓库所有源文件
      - name: Checkout repository files
        uses: actions/checkout@v4

      # 官方永久Action：系统原生Python环境，无缺失、无命令报错
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 极简打包脚本（无长多行嵌套、无粘贴损坏问题）
      - name: Build HTML to WebView APK
        run: |
          # 安装永久开源HTML网页打包库，pip系统自带，彻底解决127命令缺失
          pip install html2apk==1.2.0
          
          # 一键打包，完整包含你全部定制需求参数
          html2apk build \
          --app-name "电子通行证" \
          --package-id "com.police.pass" \
          --version-code 2 \
          --version-name "1.1" \
          --icon "./icon.png" \
          --background "./bg.jpg" \
          # 状态栏：完全透明底色 + 顶部图标纯黑色
          --status-bar-color "#00000000" \
          --status-bar-dark-icon true \
          # 背景全屏铺满 + 强制锁定竖屏
          --full-screen true \
          --screen-orientation "portrait" \
          # 核心修复：全局彻底禁用所有缓存，根治二次打开时间不显示BUG
          --disable-cache true \
          # 纯本地离线锁网，完全拦截所有网络请求
          --local-only true \
          --block-all-network true

      # 官方永久Action：上传打包完成的APK安装包
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: output/app-release.apk
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MyIdPass"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
              <!-- 彻底移除所有网络权限，纯本地离线运行 -->
              <uses-permission android:name="android.permission.INTERNET" android:maxSdkVersion="0"/>
          </manifest>
          EOF

          # ====================== 主题样式：透明状态栏+黑色图标 ======================
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <resources>
              <style name="Theme.MyIdPass" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="windowNoTitle">true</item>
                  <item name="windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowStatusBarColor">#00000000</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF

          # ====================== 主Activity代码 ======================
          # WebView核心：全局彻底禁用所有缓存 + 仅加载本地文件 + 拦截所有网络请求
          cat > app/src/main/java/com/police/pass/MainActivity.java << 'EOF'
          package com.police.pass;
          import android.os.Bundle;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings webSettings = webView.getSettings();

                  // ========== 核心：彻底全局禁用所有缓存，根治二次打开时间不显示BUG ==========
                  webSettings.setCacheMode(WebSettings.LOAD_NO_CACHE);
                  webSettings.setAppCacheEnabled(false);
                  webSettings.setDatabaseEnabled(false);
                  webView.clearHistory();
                  webView.clearCache(true);

                  // ========== 纯本地离线，完全禁止所有网络访问 ==========
                  webSettings.setAllowFileAccess(true);
                  webSettings.setAllowNetworkAccess(false);
                  webView.setWebViewClient(new WebViewClient(){
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          return true;
                      }
                  });

                  // 加载你本地assets内的HTML页面
                  webView.loadUrl("file:///android_asset/index.html");
              }

              // 系统原生返回键功能
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # ====================== 完整Gradle Wrapper配置（修复之前缺失报错） ======================
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: 拷贝你所有本地文件到Android工程
        run: |
          # 拷贝你的HTML页面
          cp index.html app/src/main/assets/
          # 拷贝应用图标、背景图
          cp icon.png app/src/main/res/drawable/icon.png
          cp bg.jpg app/src/main/res/drawable/bg.jpg
          cp music.mp3 app/src/main/assets/

      - name: 编译生成Release APK
        run: ./gradlew assembleRelease

      - name: 上传打包好的APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
